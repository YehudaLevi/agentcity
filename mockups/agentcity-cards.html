<title>agentcity — album</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --ink:#e8e4d8; --ink-dim:#a8a496; --panel:#161425; --panel2:#20203a;
    --line:#3a3856; --gold:#ffcf7a; --cyan:#7fe3e0; --red:#ff6a5a; --green:#7fe3a0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0c0b18;
    background-image:
      radial-gradient(1200px 500px at 50% -140px, #1a1832 0%, rgba(12,11,24,0) 70%);
    color:var(--ink);
    font-family:"Courier New",ui-monospace,monospace;
    min-height:100vh; padding:0 0 60px;
    -webkit-font-smoothing:none;
  }

  header#top{
    text-align:center; padding:34px 16px 10px;
  }
  header#top .mark{
    font-size:26px; font-weight:bold; letter-spacing:6px; color:var(--gold);
    text-shadow:0 2px 0 rgba(0,0,0,.5);
  }
  header#top .sub{
    margin-top:8px; font-size:12px; letter-spacing:3px; color:var(--ink-dim);
    text-transform:uppercase;
  }
  header#top .sub b{color:var(--cyan);font-weight:normal;}
  header#top .rule{
    width:min(560px,80%); height:2px; margin:16px auto 0;
    background:linear-gradient(90deg,rgba(58,56,86,0),var(--line),rgba(58,56,86,0));
  }

  #grid{
    max-width:1080px; margin:26px auto 0; padding:0 18px;
    display:grid; gap:22px;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    align-items:start;
  }
  .card{
    background:var(--panel); border:2px solid var(--line);
    box-shadow:0 0 0 2px #0c0b18, 0 8px 0 rgba(0,0,0,.35);
    padding:8px; cursor:pointer; position:relative;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 0 2px #0c0b18, 0 14px 0 rgba(0,0,0,.4), 0 0 0 2px var(--line);
    border-color:var(--gold);
  }
  .card canvas{
    display:block; width:100%; height:auto;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  .card .cap{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top:7px; font-size:10px; letter-spacing:1px;
  }
  .card .cap .k{color:var(--gold);text-transform:uppercase;}
  .card .cap .v{color:var(--ink-dim);}
  .card.portrait{grid-row:span 2;}

  footer#bot{
    text-align:center; margin-top:34px; font-size:11px;
    letter-spacing:2px; color:var(--ink-dim);
  }
  footer#bot b{color:var(--gold);font-weight:normal;}
  footer#bot span{opacity:.4;padding:0 8px;}

  /* ---- modal (export preview, HUD styled) ---- */
  #overlay{
    position:fixed; inset:0; z-index:50; display:none;
    background:rgba(6,5,14,.82);
    align-items:center; justify-content:center; padding:22px;
    opacity:0; transition:opacity .16s ease;
  }
  #overlay.on{display:flex;opacity:1;}
  #modal{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:2px solid var(--line);
    box-shadow:0 0 0 2px #0c0b18, 0 10px 0 rgba(0,0,0,.5);
    max-width:min(960px,96vw); width:auto; max-height:94vh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  #mHead{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 12px; border-bottom:2px solid var(--line); gap:12px;
  }
  #mHead .ti{font-size:13px;color:var(--gold);letter-spacing:1px;}
  #mHead .ti small{display:block;color:var(--ink-dim);font-size:9px;letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
  #mClose{
    font-family:inherit;font-size:16px;color:var(--ink);background:var(--panel2);
    border:2px solid var(--line);width:28px;height:28px;cursor:pointer;line-height:1;flex:none;
  }
  #mClose:hover{color:var(--red);border-color:var(--red);}
  #mStage{
    padding:16px; display:flex; align-items:center; justify-content:center;
    background:
      repeating-linear-gradient(45deg,#0e0d1c 0 8px,#100f20 8px 16px);
    overflow:auto; flex:1 1 auto; min-height:0;
  }
  #mCanvas{
    image-rendering:pixelated; image-rendering:crisp-edges;
    max-width:100%; max-height:64vh; width:auto; height:auto;
    box-shadow:0 6px 0 rgba(0,0,0,.4);
  }
  #mCtrls{
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    padding:11px 12px; border-top:2px solid var(--line);
  }
  .btn{
    font-family:inherit; font-size:12px; letter-spacing:1px; color:var(--ink);
    background:var(--panel2); border:2px solid var(--line); padding:7px 12px;
    cursor:pointer; text-transform:uppercase;
  }
  .btn:hover{color:var(--gold);border-color:var(--gold);}
  .btn.toggle .st{color:var(--cyan);}
  .btn.toggle.off .st{color:var(--red);}
  #mMsg{margin-left:auto;font-size:10px;letter-spacing:1px;color:var(--ink-dim);min-height:14px;}
  #mMsg.ok{color:var(--green);}

  @media (max-width:520px){
    #mCtrls{gap:7px} .btn{font-size:11px;padding:6px 9px}
    #mMsg{margin-left:0;width:100%}
  }
  @media (prefers-reduced-motion: reduce){
    .card{transition:none;}
    .card:hover{transform:none;}
    #overlay{transition:none;}
  }
</style>

<header id="top">
  <div class="mark">AGENTCITY</div>
  <div class="sub">Album &middot; <b>6 moments captured</b></div>
  <div class="rule"></div>
</header>

<main id="grid" aria-label="shareable cards"></main>

<footer id="bot">
  <b>rendered locally</b><span>&bull;</span>you choose what to share
</footer>

<div id="overlay" role="dialog" aria-modal="true">
  <div id="modal" class="panel">
    <div id="mHead">
      <div class="ti" id="mTitle">card<small id="mSub">export preview</small></div>
      <button id="mClose" title="close" aria-label="close">&times;</button>
    </div>
    <div id="mStage"><canvas id="mCanvas"></canvas></div>
    <div id="mCtrls">
      <button class="btn toggle" id="mToggle">repo names: <span class="st">ON</span></button>
      <button class="btn" id="mDownload">download PNG</button>
      <button class="btn" id="mCopy">copy</button>
      <span id="mMsg"></span>
    </div>
  </div>
</div>

<script>
(()=>{
"use strict";
const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;

// ---------------------------------------------------------------- palette
const WORK = {
  code:"#d98a48", tests:"#5fb8d6", infra:"#9aa0aa",
  api:"#4fc09a", research:"#9a76d6", planning:"#5f82d6", oldtown:"#b56a44",
};
const SEED_COLS = ["#ffcf7a","#7fe3e0","#ff6a5a","#7fe3a0","#5f82d6"];
// maya's city seed identicon (3x3, symmetric)
const SEED_GRID = [[1,0,2],[0,3,0],[2,0,1]];

// ---------------------------------------------------------------- helpers
function shade(hex,f){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r*f)); g=Math.min(255,Math.round(g*f)); b=Math.min(255,Math.round(b*f));
  return "rgb("+r+","+g+","+b+")";
}
function poly(ctx,pts,fill,stroke){
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke();}
}
function mulberry(a){
  return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; };
}
function skyGrad(ctx,W,H,stops){
  const g=ctx.createLinearGradient(0,0,0,H);
  for(const [p,c] of stops) g.addColorStop(p,c);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function stars(ctx,W,maxY,n){
  ctx.fillStyle="rgba(255,255,255,.5)";
  for(let i=0;i<n;i++) ctx.fillRect((i*97)%W,(i*53)%maxY,1,1);
}
function vignette(ctx,W,H){
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(1,"rgba(4,3,12,.5)");
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// iso building (matches iso-v3 face shading + windows)
function faceWindows(ctx,A,B,H,cols,rows,litFn,litCol,offCol){
  const dx=B.x-A.x, dy=B.y-A.y, mx=0.12,my=0.10;
  const gw=(1-2*mx)/cols, gh=(1-2*my)/rows, ww=gw*0.62, wh=gh*0.6;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const u0=mx+c*gw+(gw-ww)/2, v0=my+r*gh+(gh-wh)/2;
    const on=litFn(c,r);
    const p=(u,v)=>({x:A.x+dx*u,y:A.y+dy*u-H*v});
    poly(ctx,[p(u0,v0),p(u0+ww,v0),p(u0+ww,v0+wh),p(u0,v0+wh)], on?litCol:offCol);
  }
}
function bldg(ctx,iso,gx,gy,fw,fd,H,base,opt){
  opt=opt||{};
  const g=(x,y)=>iso.grid(x,y);
  const gT=g(gx,gy),gR=g(gx+fw,gy),gB=g(gx+fw,gy+fd),gL=g(gx,gy+fd);
  const tT={x:gT.x,y:gT.y-H},tR={x:gR.x,y:gR.y-H},tB={x:gB.x,y:gB.y-H},tL={x:gL.x,y:gL.y-H};
  let topC,rightC,leftC;
  if(opt.glass){topC=shade(base,1.55);rightC=shade(base,1.0);leftC=shade(base,0.62);}
  else if(opt.ruin){topC=shade("#4a4636",1.25);rightC="#575344";leftC="#3c3a2e";}
  else {topC=shade(base,1.35);rightC=shade(base,0.95);leftC=shade(base,0.6);}
  poly(ctx,[gL,gB,tB,tL],leftC,"rgba(0,0,0,.35)");
  poly(ctx,[gB,gR,tR,tB],rightC,"rgba(0,0,0,.25)");
  poly(ctx,[tT,tR,tB,tL],topC,"rgba(0,0,0,.2)");
  const seed=opt.seed||0, lit=opt.lit;
  const cols=Math.max(1,fw*2), rows=Math.max(2,Math.floor(H/12));
  const litCol="#ffcf7a", offCol=shade(base,0.42);
  const litFn=(c,r)=> !opt.ruin && (((c*3+r*5+seed)%5) < (lit?3:2));
  faceWindows(ctx,gL,gB,H,cols,rows,litFn,litCol,offCol);
  faceWindows(ctx,gB,gR,H,cols,rows,(c,r)=>litFn(c+7,r),litCol,offCol);
  if(opt.glass) poly(ctx,[tT,tR,tB,tL],"rgba(127,227,224,.18)");
  if(opt.ruin){
    ctx.fillStyle="#3f7a3a";
    for(let i=0;i<12;i++){const u=((seed*7+i*13)%100)/100, v=((i*17)%100)/100;
      ctx.fillRect(gL.x+(gB.x-gL.x)*u, gL.y+(gB.y-gL.y)*u-H*v,2,3);}
    ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillRect((tT.x+tB.x)/2-2,tT.y-1,5,5);
  }
  if(opt.scaffold){
    ctx.strokeStyle="#caa24a"; ctx.lineWidth=1;
    ctx.strokeRect(tL.x, tT.y, (tR.x-tL.x),(gB.y-tT.y));
    ctx.beginPath(); ctx.moveTo(tL.x,(tT.y+gB.y)/2); ctx.lineTo(tR.x,(tR.y+gR.y)/2); ctx.stroke();
  }
  return {gT,gR,gB,gL,tT,tR,tB,tL};
}
function tileD(ctx,iso,gx,gy,col){
  const T=iso.grid(gx,gy),R=iso.grid(gx+1,gy),B=iso.grid(gx+1,gy+1),L=iso.grid(gx,gy+1);
  poly(ctx,[T,R,B,L],col);
  return [T,R,B,L];
}

// ---- shared chrome: wordmark + seed-flag pennant + day-stamp
function wordmark(ctx,x,y,size){
  size=size||13;
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.font="bold "+size+"px 'Courier New',monospace";
  ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillText("AGENTCITY",x+1,y+1);
  ctx.fillStyle="#ffcf7a"; ctx.fillText("AGENTCITY",x,y);
}
function pennant(ctx,x,y){
  // pole
  ctx.fillStyle="#2a2620"; ctx.fillRect(x,y,2,22);
  ctx.fillStyle="#4a4436"; ctx.fillRect(x-1,y+21,4,2);
  // triangular pennant
  poly(ctx,[{x:x+2,y:y+1},{x:x+22,y:y+6},{x:x+2,y:y+13}],"#20203a","#3a3856");
  // seed dots
  ctx.fillStyle=SEED_COLS[0]; ctx.fillRect(x+5,y+4,2,2);
  ctx.fillStyle=SEED_COLS[1]; ctx.fillRect(x+9,y+6,2,2);
  ctx.fillStyle=SEED_COLS[3]; ctx.fillRect(x+13,y+7,2,2);
}
function dayStamp(ctx,rightX,topY,text){
  ctx.font="bold 11px 'Courier New',monospace";
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  const w=ctx.measureText(text).width+16, h=18, x=rightX-w, y=topY;
  ctx.fillStyle="rgba(12,11,24,.72)"; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle="#3a3856"; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1);
  ctx.fillStyle="#ffcf7a"; ctx.fillText(text,x+8,y+13);
}
function chrome(ctx,W,day){
  wordmark(ctx,42,24,13);
  pennant(ctx,14,8);
  dayStamp(ctx,W-14,10,day);
}
// bottom banner for titles
function banner(ctx,W,H,bh,title,stats,accent){
  const g=ctx.createLinearGradient(0,H-bh-24,0,H);
  g.addColorStop(0,"rgba(12,11,24,0)"); g.addColorStop(0.4,"rgba(12,11,24,.82)"); g.addColorStop(1,"rgba(10,9,20,.95)");
  ctx.fillStyle=g; ctx.fillRect(0,H-bh-24,W,bh+24);
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.font="bold 18px 'Courier New',monospace";
  ctx.fillStyle=accent||"#ffcf7a"; ctx.fillText(title,20,H-bh+6);
  ctx.font="12px 'Courier New',monospace";
  ctx.fillStyle="#a8a496"; ctx.fillText(stats,20,H-bh+26);
}

// small props ------------------------------------------------------------
function crateStack(ctx,x,y,n){
  const pos=[[0,0],[9,-2],[4,-11]];
  for(let i=0;i<Math.min(n,3);i++){
    const px=x+pos[i][0], py=y+pos[i][1];
    ctx.fillStyle="#9a7a4a"; ctx.fillRect(px-4,py-8,8,8);
    ctx.fillStyle="#b08a54"; ctx.fillRect(px-4,py-8,8,2);
    ctx.strokeStyle="rgba(0,0,0,.35)"; ctx.lineWidth=1; ctx.strokeRect(px-3.5,py-7.5,7,7);
    ctx.strokeStyle="#7a5a34"; ctx.beginPath(); ctx.moveTo(px-4,py-4);ctx.lineTo(px+4,py-4);ctx.stroke();
  }
}
function drawShip(ctx,x,y,z){
  poly(ctx,[{x:x-6*z,y:y-2*z},{x:x+6*z,y:y-2*z},{x:x+4*z,y:y+2.2*z},{x:x-4*z,y:y+2.2*z}],"#5a3a26");
  ctx.fillStyle="#3a2418"; ctx.fillRect(x-4*z,y+1*z,8*z,1.3*z);
  ctx.fillStyle="#8a6a44"; ctx.fillRect(x-4.5*z,y-3*z,9*z,1.4*z);
  ctx.fillStyle="#4a3320"; ctx.fillRect(x-0.5*z,y-12*z,1*z,10*z);
  ctx.fillStyle="#e8e0cc"; poly(ctx,[{x:x+0.7*z,y:y-12*z},{x:x+5.5*z,y:y-4.5*z},{x:x+0.7*z,y:y-4.5*z}],"#e8e0cc");
  ctx.fillStyle="#cfc6ac"; poly(ctx,[{x:x-0.7*z,y:y-10*z},{x:x-4*z,y:y-4.5*z},{x:x-0.7*z,y:y-4.5*z}],"#cfc6ac");
  // little flag on mast
  ctx.fillStyle="#ff6a5a"; ctx.fillRect(x-0.5*z,y-12.5*z,3*z,1.5*z);
}
function confetti(ctx,x0,y0,w,h,n,seed){
  if(REDUCE) return;
  const r=mulberry(seed||7);
  for(let i=0;i<n;i++){
    const px=x0+r()*w, py=y0+r()*h;
    ctx.fillStyle=SEED_COLS[Math.floor(r()*SEED_COLS.length)];
    const s=2+Math.floor(r()*2);
    ctx.fillRect(px,py,s,s);
  }
}

// generic mini iso city (the "map miniature")
function miniCity(ctx,o){
  const {ox,oy,hw,hh,cols,rows,seed}=o;
  const iso={grid:(gx,gy)=>({x:ox+(gx-gy)*hw,y:oy+(gx+gy)*hh})};
  const r=mulberry(seed);
  const cx=cols/2, cy=rows/2, R=o.R||Math.min(cols,cy)*0.95;
  const cats=o.cats||["code","tests","infra","api","research","planning"];
  const bmap={};
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const rr=Math.hypot(x-cx,y-cy);
    const rv1=r(), rv2=r(), rv3=r(), rv4=r();
    if(rr>R) { bmap[x+","+y]="skip"; continue; }
    const water = (x+y) > (cols+rows-1)-o.shore;
    if(water){ bmap[x+","+y]="water"; continue; }
    if(rv1 < (o.density||0.5)){
      const cat = o.forceCat || cats[Math.floor(rv2*cats.length)];
      bmap[x+","+y]={h:(o.minH||5)+Math.floor(rv3*(o.maxH||26)), cat,
        seed:Math.floor(rv4*1000), lit:rv2<0.62, glass:cat==="tests"};
    } else bmap[x+","+y]="grass";
  }
  for(let s=0;s<cols+rows;s++){
    for(let x=Math.max(0,s-rows+1);x<=Math.min(cols-1,s);x++){
      const y=s-x; if(y<0||y>=rows)continue;
      const cell=bmap[x+","+y];
      if(cell==="skip") continue;
      if(cell==="water"){
        const [T]=[tileD(ctx,iso,x,y,"#2b567e")];
        const c0=iso.grid(x,y), c2=iso.grid(x+1,y+1);
        ctx.fillStyle=((x+y)&1)?"#356b93":"#265073";
        ctx.fillRect((c0.x+c2.x)/2-3,(c0.y+c2.y)/2,6,1);
        continue;
      }
      tileD(ctx,iso,x,y, ((x+y)&1)?"#356336":"#3c6b3a");
      if(cell && cell.h) bldg(ctx,iso,x,y,1,1,cell.h,WORK[cell.cat],{lit:cell.lit,glass:cell.glass,seed:cell.seed});
    }
  }
}

// ==================================================================== CARDS
function names(on){ return {
  webshop: on?"webshop":"building-7",
  billing: on?"billing-svc":"building-8",
  legacy:  on?"legacy-api":"building-9",
};}

// 1 — TIER UPGRADE
function drawTier(ctx,W,H,namesOn){
  skyGrad(ctx,W,H,[[0,"#151330"],[0.5,"#2a2144"],[0.8,"#43304a"],[1,"#573a48"]]);
  stars(ctx,W,H*0.42,26);
  const iso={grid:(gx,gy)=>({x:280+(gx-gy)*26, y:170+(gx+gy)*13})};
  // plaza
  for(let y=0;y<4;y++)for(let x=0;x<4;x++)
    tileD(ctx,iso,x,y, (x+y)&1?"#5f5a54":"#6b6660");
  // back buildings
  bldg(ctx,iso,0,0,1,1,96,WORK.code,{lit:1,seed:12});
  bldg(ctx,iso,3,0,1,1,70,WORK.code,{lit:0,seed:44});
  bldg(ctx,iso,0,3,1,1,60,WORK.code,{lit:1,seed:71});
  // crane to the right (scaffolding just removed)
  (function crane(){
    const b=iso.grid(3,2);
    ctx.strokeStyle="#e0b03a"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x,b.y-150); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x-4,b.y-150); ctx.lineTo(b.x-70,b.y-140); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.x-55,b.y-142); ctx.lineTo(b.x-55,b.y-120); ctx.stroke();
    ctx.fillStyle="#e0b03a"; ctx.fillRect(b.x-58,b.y-120,6,5);
  })();
  // hero tower (tier 4 residential mid-rise, just topped out)
  const g=bldg(ctx,iso,1,1,1,1,150,WORK.code,{lit:1,seed:7});
  // roof cap
  ctx.fillStyle=shade(WORK.code,1.6);
  ctx.fillRect((g.tT.x+g.tB.x)/2-14, g.tT.y-6, 28, 6);
  // floating tier tag
  (function tag(){
    const tx=(g.tT.x+g.tB.x)/2, ty=g.tT.y-24;
    ctx.font="bold 11px 'Courier New',monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
    const w=88;
    ctx.fillStyle="rgba(12,11,24,.85)"; ctx.fillRect(tx-w/2,ty-10,w,20);
    ctx.strokeStyle="#7fe3e0"; ctx.lineWidth=1; ctx.strokeRect(tx-w/2+.5,ty-9.5,w-1,19);
    ctx.fillStyle="#a8a496"; ctx.fillText("TIER 3",tx-24,ty);
    ctx.fillStyle="#7fe3e0"; ctx.fillText("→",tx+8,ty);

function drawShipCard(ctx,W,H,namesOn){

// 4 — POSTCARD
function drawPostcard(ctx,W,H){
  skyGrad(ctx,W,H,[[0,"#1a1636"],[0.45,"#3a2850"],[0.7,"#7a4658"],[0.88,"#c9743f"]]);
  stars(ctx,W,H*0.3,18);
  miniCity(ctx,{ox:W/2,oy:70,hw:9,hh:4.5,cols:34,rows:30,seed:94123,
    R:14,shore:9,density:0.5,minH:6,maxH:34});
  // reflection glow near water
  vignette(ctx,W,H);
  // greeting (postcard script)
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.font="italic 15px Georgia,'Times New Roman',serif";
  ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillText("greetings from",23,H-45);
  ctx.fillStyle="#e8e4d8"; ctx.fillText("greetings from",22,H-46);
  ctx.font="bold 22px Georgia,'Times New Roman',serif";
  ctx.fillStyle="#ffcf7a"; ctx.fillText("MAYA'S CITY",22,H-20);
  // postmark circle (double ring + cancellation + rotated text)
  (function postmark(){
    const px=W-96, py=54, R=34;
    ctx.strokeStyle="rgba(232,228,216,.85)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(px,py,R,0,7); ctx.stroke();
    ctx.lineWidth=1; ctx.beginPath(); ctx.arc(px,py,R-5,0,7); ctx.stroke();
    ctx.save(); ctx.translate(px,py);
    ctx.fillStyle="rgba(232,228,216,.9)"; ctx.font="bold 8px 'Courier New',monospace";
    ctx.textAlign="center";
    const txt="• AGENTCITY • DAY 94 •", n=txt.length;
    for(let i=0;i<n;i++){ const a=(i/n)*Math.PI*2 - Math.PI/2;
      ctx.save(); ctx.rotate(a); ctx.translate(0,-(R-14)); ctx.fillText(txt[i],0,0); ctx.restore(); }
    ctx.font="bold 9px 'Courier New',monospace"; ctx.fillText("DAY",0,-2); ctx.fillText("94",0,9);
    ctx.restore();
    // cancellation wavy lines
    ctx.strokeStyle="rgba(232,228,216,.7)"; ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){ const y=py-9+i*6;
      ctx.beginPath(); ctx.moveTo(px+R-4,y); ctx.lineTo(px+R+40,y-2); ctx.stroke(); }
  })();
  // postage stamp corner (top-right), perforated, holds seed-flag
  (function stamp(){
    const sw=52, sh=62, sx=W-sw-14, sy=12;
    // perforation: white scalloped bg
    ctx.fillStyle="#e8e4d8"; ctx.fillRect(sx-2,sy-2,sw+4,sh+4);
    ctx.fillStyle="#0c0b18";
    for(let i=0;i<Math.ceil((sw+4)/6);i++){ ctx.fillRect(sx-2+i*6,sy-4,3,3); ctx.fillRect(sx-2+i*6,sy+sh,3,3); }
    for(let i=0;i<Math.ceil((sh+4)/6);i++){ ctx.fillRect(sx-4,sy-2+i*6,3,3); ctx.fillRect(sx+sw,sy-2+i*6,3,3); }
    // stamp interior
    const ig=ctx.createLinearGradient(sx,sy,sx,sy+sh);
    ig.addColorStop(0,"#2a2144"); ig.addColorStop(1,"#3a2850");
    ctx.fillStyle=ig; ctx.fillRect(sx+2,sy+2,sw-4,sh-4);
    ctx.strokeStyle="#20203a"; ctx.lineWidth=1; ctx.strokeRect(sx+2.5,sy+2.5,sw-5,sh-5);
    // seed-flag identicon
    const gx=sx+sw/2-12, gy=sy+8, cell=8;
    for(let r=0;r<3;r++)for(let c=0;c<3;c++){ const v=SEED_GRID[r][c];
      if(v){ ctx.fillStyle=SEED_COLS[v]; ctx.fillRect(gx+c*cell,gy+r*cell,cell-1,cell-1); } }
    ctx.fillStyle="#ffcf7a"; ctx.font="bold 8px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.fillText("SEED",sx+sw/2,sy+sh-12); ctx.fillText("· 1 ·",sx+sw/2,sy+sh-3);
    ctx.textAlign="left";
  })();
  wordmark(ctx,16,26,13);
  pennant(ctx,W-16,H-30);
}

// 6 — STREAK
function drawStreak(ctx,W,H){
  skyGrad(ctx,W,H,[[0,"#151330"],[1,"#241a36"]]);
  stars(ctx,W,H*0.5,24);
  ctx.fillStyle="#16142530"; ctx.fillRect(0,0,W,H);
  // title
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.font="bold 22px 'Courier New',monospace"; ctx.fillStyle="#ffcf7a";
  ctx.fillText("14-day building streak",70,46);
  flame(ctx,44,40,1.5);
  ctx.font="11px 'Courier New',monospace"; ctx.fillStyle="#a8a496";
  ctx.fillText("each tile = that day's skyline delta",70,64);
  // day tiles
  const n=14, gap=6, pad=26, avail=W-2*pad;
  const sz=Math.min(38,(avail-(n-1)*gap)/n);
  const totalW=n*sz+(n-1)*gap, startX=(W-totalW)/2, ty=92;
  const r=mulberry(1414);
  for(let i=0;i<n;i++){
    const x=startX+i*(sz+gap);
    dayTile(ctx,x,ty,sz,i,n,r);
  }
  // stat row
  ctx.textAlign="center";
  ctx.font="bold 30px 'Courier New',monospace"; ctx.fillStyle="#ffcf7a";
  ctx.fillText("+412 WU",W/2,H-52);
  ctx.font="11px 'Courier New',monospace"; ctx.fillStyle="#a8a496";
  ctx.fillText("this streak  ·  longest yet  ·  don't break the chain",W/2,H-34);
  ctx.textAlign="left";
  vignette(ctx,W,H);
  chrome(ctx,W,"DAY 94");
}
function dayTile(ctx,x,y,sz,i,n,r){
  const last=i===n-1;
  ctx.fillStyle="#161425"; ctx.fillRect(x,y,sz,sz);
  ctx.strokeStyle=last?"#ff8a4a":"#3a3856"; ctx.lineWidth=last?2:1;
  ctx.strokeRect(x+.5,y+.5,sz-1,sz-1);
  // mini iso ground + growing skyline
  const ox=x+sz/2, oy=y+sz*0.72, hw=sz*0.2, hh=sz*0.1;
  const iso={grid:(gx,gy)=>({x:ox+(gx-gy)*hw, y:oy+(gx+gy)*hh})};
  tileD(ctx,iso,0,0,"#2a2840");
  const cats=["code","tests","infra","api","research","planning"];
  const growth=(i+1)/n;
  const h1=4+growth*(sz*0.7)*(0.6+r()*0.5);
  bldg(ctx,iso,0,0,1,1,h1,WORK[cats[i%cats.length]],{lit:r()<0.6,seed:i*13});
  if(i>2){ const h2=3+growth*(sz*0.4)*(0.5+r()*0.6);
    bldg(ctx,iso,1,0,1,1,h2,WORK[cats[(i+2)%cats.length]],{lit:r()<0.5,seed:i*7}); }
  // day number
  ctx.fillStyle=last?"#ffcf7a":"#a8a496"; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.font="7px 'Courier New',monospace"; ctx.fillText("d"+(81+i),x+sz/2,y+sz-3);
  ctx.textAlign="left";
  if(last) flame(ctx,x+sz/2,y-2,0.8);
}
function flame(ctx,x,y,s){
  poly(ctx,[{x:x,y:y-16*s},{x:x+7*s,y:y-4*s},{x:x+4*s,y:y+2*s},{x:x-4*s,y:y+2*s},{x:x-7*s,y:y-4*s}],"#ff6a3a");
  poly(ctx,[{x:x,y:y-11*s},{x:x+4*s,y:y-3*s},{x:x+2*s,y:y+1*s},{x:x-2*s,y:y+1*s},{x:x-4*s,y:y-3*s}],"#ffcf7a");
  ctx.fillStyle="#fff2c8"; ctx.fillRect(x-1*s,y-6*s,2*s,3*s);
}

let NAMES_ON=true;
const DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));

function paint(canvas,def,mult){
  const s=mult*DPR;
  canvas.width=Math.round(def.w*s);
  canvas.height=Math.round(def.h*s);
  const ctx=canvas.getContext("2d");
  ctx.setTransform(s,0,0,s,0,0);
  ctx.imageSmoothingEnabled=false;
  // clip to inner frame region, draw scene, then frame
  ctx.save();
  ctx.beginPath(); ctx.rect(4,4,def.w-8,def.h-8); ctx.clip();
  def.draw(ctx,def.w,def.h,NAMES_ON);
  ctx.restore();
  // frame
  ctx.strokeStyle="#0c0b18"; ctx.lineWidth=8; ctx.strokeRect(4,4,def.w-8,def.h-8);
  ctx.strokeStyle="#3a3856"; ctx.lineWidth=2; ctx.strokeRect(4,4,def.w-8,def.h-8);
}

const grid=document.getElementById("grid");
const galleryCanvas={};
for(const def of CARDS){
  const card=document.createElement("div");
  card.className="card"+(def.h>def.w?" portrait":"");
  card.tabIndex=0; card.setAttribute("role","button");
  card.setAttribute("aria-label","open "+def.k+" card");
  const cv=document.createElement("canvas");
  paint(cv,def,2);
  galleryCanvas[def.id]=cv;
  const cap=document.createElement("div");
  cap.className="cap";
  cap.innerHTML='<span class="k">'+def.k+'</span><span class="v">'+def.day+'</span>';
  card.appendChild(cv); card.appendChild(cap);
  card.addEventListener("click",()=>openModal(def));
  card.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();openModal(def);} });
  grid.appendChild(card);
}

const overlay=document.getElementById("overlay");
const mCanvas=document.getElementById("mCanvas");
const mTitle=document.getElementById("mTitle");
const mSub=document.getElementById("mSub");
const mToggle=document.getElementById("mToggle");
const mMsg=document.getElementById("mMsg");
let current=null;

function refreshToggleBtn(){
  mToggle.classList.toggle("off",!NAMES_ON);
  mToggle.querySelector(".st").textContent=NAMES_ON?"ON":"OFF";
}
function setTitle(def){
  mTitle.childNodes[0].nodeValue=def.title(NAMES_ON);
  mSub.textContent=def.k+" · "+def.w+"×"+def.h+(def.named?" · has repo name":"");
}
function openModal(def){
  current=def; mMsg.textContent=""; mMsg.className="";
  paint(mCanvas,def,3);
  setTitle(def); refreshToggleBtn();
  overlay.classList.add("on");
}

document.getElementById("mClose").addEventListener("click",closeModal);
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&overlay.classList.contains("on")) closeModal(); });

mToggle.addEventListener("click",()=>{
  NAMES_ON=!NAMES_ON;
  refreshToggleBtn();
  // re-render everything so the album reflects the choice
  for(const def of CARDS) paint(galleryCanvas[def.id],def,2);
  if(current){ paint(mCanvas,current,3); setTitle(current); }
  msg(NAMES_ON?"repo names shown":"repo names hidden (aliased)",false);
});

function msg(t,ok){ mMsg.textContent=t; mMsg.className=ok?"ok":""; }

document.getElementById("mDownload").addEventListener("click",()=>{
  if(!current) return;
  mCanvas.toBlob(b=>{
    if(!b){ msg("export failed",false); return; }
    const url=URL.createObjectURL(b);
    const a=document.createElement("a");
    a.href=url; a.download="agentcity-"+current.id+(NAMES_ON?"":"-anon")+".png";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    msg("downloaded PNG",true);
  },"image/png");
});

document.getElementById("mCopy").addEventListener("click",()=>{
  if(!current) return;
  if(!(navigator.clipboard && window.ClipboardItem)){ msg("copy unavailable — use download",false); return; }
  mCanvas.toBlob(async b=>{
    try{
      await navigator.clipboard.write([new ClipboardItem({"image/png":b})]);
      msg("copied to clipboard",true);
    }catch(e){ msg("copy blocked — use download",false); }
  },"image/png");
});
})();
</script>
